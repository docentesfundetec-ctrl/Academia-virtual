<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Campus Virtual | Fundación Dunamis</title>
    <link rel="manifest" href="manifest.json">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .fade-in { animation: fadeIn 0.4s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .glass-card { background: rgba(255, 255, 255, 0.98); backdrop-filter: blur(10px); border: 1px solid #e2e8f0; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05); }
        .hidden-view { display: none !important; }
        .iframe-container { position: relative; width: 100%; padding-bottom: 56.25%; height: 0; border-radius: 1rem; overflow: hidden; background: #000; }
        .iframe-container iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 font-sans h-screen overflow-hidden flex flex-col">

    <div id="toast" class="fixed top-5 right-5 z-50 transform translate-x-full opacity-0 transition-all duration-300 text-white px-6 py-3 rounded-lg shadow-xl flex items-center gap-3">
        <i class="fa-solid fa-bell"></i> <span id="toast-msg"></span>
    </div>

    <div id="login-view" class="flex h-screen w-full fade-in">
        <div class="hidden md:flex w-1/2 bg-blue-900 text-white flex-col justify-between p-12 relative overflow-hidden">
            <div class="relative z-10">
                <div class="flex items-center gap-3 mb-8">
                    <div class="w-12 h-12 bg-white text-blue-900 rounded-lg flex items-center justify-center text-2xl shadow-lg"><i class="fa-solid fa-graduation-cap"></i></div>
                    <h1 class="text-2xl font-bold">Fundación Dunamis</h1>
                </div>
                <h2 class="text-4xl font-bold mb-4">Educación Virtual</h2>
                <p class="text-blue-200 text-lg">Programas Técnicos y Bachillerato en Cartagena.</p>
            </div>
            <div class="absolute -bottom-24 -left-24 w-96 h-96 bg-blue-600 rounded-full mix-blend-multiply blur-3xl opacity-40"></div>
        </div>
        <div class="w-full md:w-1/2 flex items-center justify-center p-8 bg-white">
            <div class="w-full max-w-md">
                <h3 class="text-2xl font-bold mb-6 text-center">Iniciar Sesión</h3>
                <input type="text" id="access-code" placeholder="CÓDIGO DE ACCESO" class="block w-full px-4 py-4 border rounded-2xl mb-4 text-center uppercase font-bold tracking-widest outline-none focus:ring-2 focus:ring-blue-600">
                <button onclick="login()" class="w-full bg-blue-600 text-white font-bold py-4 rounded-2xl shadow-lg hover:bg-blue-700 transition-all">Acceder al Campus</button>
                <p id="login-error" class="text-red-500 text-sm text-center mt-4 hidden font-bold">⚠️ Código inválido.</p>
            </div>
        </div>
    </div>

    <div id="app-layout" class="hidden-view flex h-screen bg-slate-100 w-full overflow-hidden">
        <aside class="w-64 bg-slate-900 text-slate-300 flex flex-col hidden md:flex">
            <div class="p-6 border-b border-slate-800">
                <p class="text-white font-bold" id="user-display-role">Cargando...</p>
                <p class="text-xs text-slate-400">Dunamis 2026</p>
            </div>
            <nav class="flex-1 p-4 space-y-2">
                <button onclick="cerrarAulaVirtual()" class="w-full flex items-center gap-3 bg-blue-600 text-white px-4 py-3 rounded-xl"><i class="fa-solid fa-house"></i> Inicio</button>
                <button onclick="window.open('https://wa.me/573000000000', '_blank')" class="w-full flex items-center gap-3 hover:bg-slate-800 px-4 py-3 rounded-xl transition-colors"><i class="fa-solid fa-headset"></i> Soporte</button>
            </nav>
            <div class="p-4 border-t border-slate-800">
                <button onclick="logout()" class="text-red-400 flex items-center gap-3 px-4"><i class="fa-solid fa-power-off"></i> Salir</button>
            </div>
        </aside>

        <main class="flex-1 overflow-y-auto p-6">
            <div id="teacher-dashboard" class="hidden-view max-w-5xl mx-auto space-y-6">
                <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
                    <div class="glass-card p-6 rounded-2xl border-t-4 border-purple-600">
                        <h3 class="font-bold text-lg mb-4">Nueva Unidad</h3>
                        <input type="text" id="c-titulo" placeholder="Título" class="w-full p-3 border rounded-xl mb-3">
                        <input type="text" id="c-video" placeholder="Video Embed" class="w-full p-3 border rounded-xl mb-3">
                        <input type="text" id="c-drive" placeholder="Drive URL" class="w-full p-3 border rounded-xl mb-3">
                        <textarea id="c-preguntas" placeholder='Ej: [{"p":"¿Pregunta?","o":["Si","No"],"c":0}]' class="w-full p-3 text-xs font-mono border rounded-xl h-24 mb-4"></textarea>
                        <button onclick="publicarUnidad()" class="w-full bg-purple-600 text-white font-bold py-3 rounded-xl">Publicar Unidad</button>
                    </div>
                    <div class="glass-card p-6 rounded-2xl border-t-4 border-blue-600 h-fit">
                        <h3 class="font-bold text-lg mb-4">Matrículas WhatsApp</h3>
                        <select id="gen-programa" class="w-full border p-3 rounded-xl mb-4">
                            <option value="FARM">Farmacia</option><option value="BACH">Bachillerato</option><option value="ADM">Aux. Administrativo</option>
                        </select>
                        <button onclick="generarNuevoCodigo()" class="w-full bg-slate-800 text-white font-bold py-3 rounded-xl">Generar Código</button>
                        <div id="codigo-box" class="hidden mt-4 p-4 bg-blue-50 border rounded-2xl text-center">
                            <p id="codigo-resultado" class="text-2xl font-black mb-4"></p>
                            <button onclick="enviarWpp()" class="w-full bg-green-500 text-white font-bold py-2 rounded-xl text-sm"><i class="fa-brands fa-whatsapp"></i> Enviar por Chat</button>
                        </div>
                    </div>
                </div>
            </div>

            <div id="student-dashboard" class="hidden-view max-w-5xl mx-auto space-y-6">
                <div class="bg-gradient-to-r from-blue-700 to-blue-500 rounded-2xl p-6 text-white shadow-lg">
                    <h2 class="text-2xl font-bold mb-1">Tu Progreso</h2>
                    <div class="flex items-center gap-4 mt-4">
                        <div class="flex-1 bg-black/20 rounded-full h-3"><div id="progress-bar" class="bg-white h-3 rounded-full transition-all" style="width: 0%"></div></div>
                        <span id="progress-text" class="font-bold text-sm">0%</span>
                    </div>
                </div>
                <div id="student-classes-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>
            </div>

            <div id="aula-virtual" class="hidden-view max-w-4xl mx-auto">
                <button onclick="cerrarAulaVirtual()" class="mb-4 font-bold text-blue-600"><i class="fa-solid fa-arrow-left"></i> Volver</button>
                <h2 id="aula-titulo" class="text-2xl font-bold mb-6"></h2>
                <div id="contenido-clase">
                    <div class="glass-card p-4 rounded-2xl mb-6"><div class="iframe-container" id="aula-video"></div></div>
                    <div class="glass-card p-4 rounded-2xl mb-6"><div class="iframe-container" style="padding-bottom: 80%" id="aula-doc"></div></div>
                    <button onclick="iniciarExamen()" class="w-full bg-blue-600 text-white font-bold py-4 rounded-2xl">FINALIZAR Y TOMAR EXAMEN</button>
                </div>
                <div id="zona-examen" class="hidden-view glass-card p-8 rounded-2xl space-y-8">
                    <div id="preguntas-container" class="space-y-6"></div>
                    <button onclick="calificarExamen()" class="w-full bg-green-600 text-white font-bold py-4 rounded-2xl">ENVIAR EVALUACIÓN</button>
                </div>
            </div>
        </main>
    </div>

    <script>
        const SUPABASE_URL = "https://pswbbngdoclnaxwbvmam.supabase.co";
        const SUPABASE_KEY = "sb_publishable_pCGLkCeypIGl7C7nMB7B7A_-QulRYJH";
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let userCode = "";
        let currentU = null;
        let unitsList = [];

        function showToast(msg, isSuccess = true) {
            const t = document.getElementById('toast');
            document.getElementById('toast-msg').innerText = msg;
            t.style.backgroundColor = isSuccess ? '#10b981' : '#ef4444';
            t.classList.remove('translate-x-full', 'opacity-0');
            setTimeout(() => t.classList.add('translate-x-full', 'opacity-0'), 3000);
        }

        async function login() {
            const code = document.getElementById('access-code').value.trim().toUpperCase();
            userCode = code;
            if(code === "ADMIN-DUNAMIS-2026") {
                document.getElementById('user-display-role').innerText = "Coordinación";
                document.getElementById('login-view').classList.add('hidden-view');
                document.getElementById('app-layout').classList.remove('hidden-view');
                document.getElementById('teacher-dashboard').classList.remove('hidden-view');
                return;
            }
            if(code.startsWith('EST-')) {
                document.getElementById('user-display-role').innerText = "Estudiante";
                document.getElementById('login-view').classList.add('hidden-view');
                document.getElementById('app-layout').classList.remove('hidden-view');
                document.getElementById('student-dashboard').classList.remove('hidden-view');
                cargarUnidades();
            } else {
                document.getElementById('login-error').classList.remove('hidden');
            }
        }

        async function cargarUnidades() {
            const { data: units } = await supabase.from('unidades').select('*');
            const { data: progress } = await supabase.from('progreso_estudiantes').select('unidad_id').eq('estudiante_id', userCode);
            
            unitsList = units;
            const completedIds = progress.map(p => p.unidad_id);
            const pct = units.length ? Math.round((completedIds.length / units.length) * 100) : 0;
            
            document.getElementById('progress-bar').style.width = pct + '%';
            document.getElementById('progress-text').innerText = pct + '% Completado';

            document.getElementById('student-classes-container').innerHTML = units.map(u => {
                const isDone = completedIds.includes(u.id);
                return `
                <div class="glass-card p-6 rounded-2xl cursor-pointer hover:border-blue-400 transition" onclick='abrirAulaVirtual(${JSON.stringify(u)})'>
                    <div class="text-xs font-bold mb-2">${isDone ? '<span class="text-green-500">✓ Completado</span>' : '<span class="text-orange-500">○ Pendiente</span>'}</div>
                    <h3 class="font-bold text-lg mb-4">${u.titulo}</h3>
                    <div class="text-blue-600 text-sm font-bold">Entrar →</div>
                </div>`;
            }).join('');
        }

        function abrirAulaVirtual(u) {
            currentU = u;
            document.getElementById('student-dashboard').classList.add('hidden-view');
            document.getElementById('aula-virtual').classList.remove('hidden-view');
            document.getElementById('aula-titulo').innerText = u.titulo;
            document.getElementById('aula-video').innerHTML = `<iframe src="${u.video}" allowfullscreen></iframe>`;
            document.getElementById('aula-doc').innerHTML = `<iframe src="${u.doc}"></iframe>`;
            document.getElementById('contenido-clase').classList.remove('hidden-view');
            document.getElementById('zona-examen').classList.add('hidden-view');
        }

        function cerrarAulaVirtual() {
            document.getElementById('aula-virtual').classList.add('hidden-view');
            document.getElementById('student-dashboard').classList.remove('hidden-view');
        }

        function iniciarExamen() {
            const pregs = currentU.preguntas || [];
            if(!pregs.length) return registrarProgreso();
            document.getElementById('contenido-clase').classList.add('hidden-view');
            document.getElementById('zona-examen').classList.remove('hidden-view');
            document.getElementById('preguntas-container').innerHTML = pregs.map((q, i) => `
                <div class="p-4 bg-slate-50 rounded-xl">
                    <p class="font-bold mb-4">${i+1}. ${q.p}</p>
                    ${q.o.map((opt, oi) => `<label class="flex items-center gap-3 mb-2"><input type="radio" name="q${i}" value="${oi}"> ${opt}</label>`).join('')}
                </div>
            `).join('');
        }

        async function calificarExamen() {
            const pregs = currentU.preguntas;
            let ok = 0;
            pregs.forEach((q, i) => {
                const sel = document.querySelector(`input[name="q${i}"]:checked`);
                if(sel && parseInt(sel.value) === q.c) ok++;
            });
            const nota = ((ok / pregs.length) * 5).toFixed(1);
            await supabase.from('calificaciones').insert([{ estudiante_id: userCode, unidad_id: currentU.id, nota: parseFloat(nota) }]);
            registrarProgreso();
        }

        async function registrarProgreso() {
            await supabase.from('progreso_estudiantes').insert([{ estudiante_id: userCode, unidad_id: currentU.id }]);
            showToast("Unidad completada");
            location.reload();
        }

        async function publicarUnidad() {
            const titulo = document.getElementById('c-titulo').value;
            const video = document.getElementById('c-video').value;
            const doc = document.getElementById('c-drive').value;
            const preguntas = JSON.parse(document.getElementById('c-preguntas').value || "[]");
            await supabase.from('unidades').insert([{ titulo, video, doc, preguntas }]);
            location.reload();
        }

        function generarNuevoCodigo() {
            const p = document.getElementById('gen-programa').value;
            const r = Math.random().toString(36).substring(2, 6).toUpperCase();
            const code = `EST-${p}-${r}`;
            document.getElementById('codigo-resultado').innerText = code;
            document.getElementById('codigo-box').classList.remove('hidden');
        }

        function enviarWpp() {
            const code = document.getElementById('codigo-resultado').innerText;
            const msg = `¡Bienvenido! Tu código de campus es: *${code}*`;
            window.open(`https://wa.me/?text=${encodeURIComponent(msg)}`, '_blank');
        }

        function logout() { location.reload(); }
    </script>
</body>
</html>
